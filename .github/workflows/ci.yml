name: Jarvis CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  quality-check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify global Python
        run: python --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Create .env for CI
        run: |
          echo "JARVIS_SECOND_FACTOR_PIN=2468" >> .env
          echo "JARVIS_SECOND_FACTOR_PASSPHRASE=jarvis-confirm" >> .env

      - name: Syntax check (compileall)
        run: python -m compileall -q .

      - name: Benchmark freshness policy (checked-in artifacts)
        run: python scripts/check_benchmark_freshness.py --max-age-hours 336

      - name: Regenerate benchmark artifacts (mock-safe)
        run: |
          python scripts/benchmark_wake_reliability.py
          python scripts/benchmark_stt_reliability.py --mode mock
          python scripts/aggregate_tts_mos.py --csv benchmarks/tts_mos_sample_ratings.csv --output jarvis_tts_mos.json
          python scripts/benchmark_tts_quality.py --mode mock --backend auto
          python scripts/benchmark_phase5_dialogue.py --pack benchmarks/phase5_transcripts.json --output jarvis_phase5_dialogue_benchmark.json
          python scripts/benchmark_phase5_dialogue.py --pack benchmarks/phase5_transcripts_long_horizon.json --output jarvis_phase5_dialogue_long_horizon_benchmark.json

      - name: Benchmark freshness policy (generated artifacts)
        run: python scripts/check_benchmark_freshness.py --max-age-hours 2

      - name: Unit tests (ResourceWarning as error)
        run: python -W error::ResourceWarning -m unittest discover -s tests -p "test_*.py"
