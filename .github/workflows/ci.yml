name: Jarvis CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  quality-check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify global Python
        run: python --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Create .env for CI
        run: |
          echo "JARVIS_SECOND_FACTOR_PIN=2468" >> .env
          echo "JARVIS_SECOND_FACTOR_PASSPHRASE=jarvis-confirm" >> .env

      - name: Syntax check (compileall)
        run: python -m compileall -q .
